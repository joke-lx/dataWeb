name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/joke-lx/dataweb-api
  IMAGE_WEB: ghcr.io/joke-lx/dataweb-web

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server over SSH
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || 22 }}
          source: "docker-compose.prod.yml"
          target: "~/dataweb/"
          timeout: 5m

      - name: Pull images and (re)start stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || 22 }}
          timeout: 5m
          command_timeout: 15m
          envs: GITHUB_SHA
          script: |
            set -e
            cd ~/dataweb

            # Pin this deploy to the exact commit images (public GHCR = no login).
            echo "TAG=${GITHUB_SHA}" > .env
            mkdir -p data

            echo "Pulling images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Starting stack..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Pruning old images..."
            docker image prune -f || true

            # Health check with retry (web on :80, api via web's /api proxy).
            echo "Health check..."
            MAX=6
            i=0
            ok=false
            while [ $i -lt $MAX ]; do
              i=$((i + 1))
              echo "Attempt $i/$MAX..."
              if curl -f -s http://localhost/ >/dev/null 2>&1 \
                 && curl -f -s http://localhost/api/health >/dev/null 2>&1; then
                ok=true
                echo "Health check passed!"
                break
              fi
              sleep 5
            done

            if [ "$ok" = false ]; then
              echo "Health check FAILED. Recent logs:"
              docker compose -f docker-compose.prod.yml logs --tail 60
              exit 1
            fi

            echo "Deployment successful!"
        env:
          GITHUB_SHA: ${{ github.sha }}
