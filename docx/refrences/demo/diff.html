<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Differential Chromatin Interaction Map (WebGL)</title>
<style>
  :root{ --ink:#2C2C2B; --muted:#7D7A75; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    color:var(--ink);}
  .wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .fig{position:relative;width:500px;height:540px;}
  canvas{position:absolute;image-rendering:pixelated;}
  #gl{border:1px solid #cfcfcd;}
  .lbl{position:absolute;font-size:13px;letter-spacing:.2px;}
  .lbl.tiny{font-size:12px;}
  .white-ish{color:#3a3a38;}
  svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  .cbTitle{position:absolute;font-size:13px;color:var(--ink);white-space:nowrap;text-align:center;}
  .tri{position:absolute;font-size:14px;color:#2b2b2a;white-space:nowrap;}
</style>
</head>
<body>
<div class="wrap">
  <div class="fig" id="fig">
    <canvas id="gl"></canvas>
    <canvas id="cbar"></canvas>
    <svg id="ov" width="500" height="540"></svg>
  </div>
</div>
<script>
// ---------- Layout ----------
const HX = 60, HY = 96, HS = 384;      // heatmap origin + size (square)
const N  = 80;                          // grid resolution (fine, speckled)
// colorbar (horizontal, top-center)
const CB_W = 150, CB_H = 13;
const CB_X = HX + (HS-CB_W)/2, CB_Y = 44;
const VMAX = 40;

// ---------- Build antisymmetric differential matrix ----------
let seed = 1337771;
function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
function gauss(){ let u=rnd()||1e-9, v=rnd(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }

// raw field R, then antisymmetrize: M = R[i][j] - R[j][i]  (=> M[j][i] = -M[i][j])
const R = new Float32Array(N*N);
// fine salt-and-pepper speckle
for(let i=0;i<N;i++) for(let j=0;j<N;j++) R[i*N+j] = gauss()*10;
// localized features (row=cy, col=cx). Positive => red on the (i<j?) side.
const blobs = [
  // strong vertical red streak (thin in col, tall in row) near right
  {cy:58, cx:60, amp: 55, sy:16, sx:2.2},
  // horizontal red streak near bottom
  {cy:66, cx:44, amp: 48, sy:2.2, sx:14},
  // red band parallel to diagonal, lower-right
  {cy:60, cx:66, amp: 42, sy:5, sx:5},
  {cy:70, cx:74, amp: 38, sy:4, sx:4},
  // secondary vertical streak
  {cy:40, cx:52, amp: 34, sy:12, sx:1.8},
  // blue clusters (negative)
  {cy:22, cx:34, amp:-40, sy:6, sx:6},
  {cy:30, cx:14, amp:-34, sy:5, sx:7},
  {cy:48, cx:26, amp:-30, sy:7, sx:4},
  {cy:12, cx:20, amp:-26, sy:5, sx:5},
];
for(const b of blobs){
  for(let i=0;i<N;i++) for(let j=0;j<N;j++){
    const e = Math.exp(-((i-b.cy)*(i-b.cy)/(2*b.sy*b.sy) + (j-b.cx)*(j-b.cx)/(2*b.sx*b.sx)));
    if(e>0.01) R[i*N+j] += b.amp*e;
  }
}
const tex = new Uint8Array(N*N);
for(let i=0;i<N;i++) for(let j=0;j<N;j++){
  const m = R[i*N+j] - R[j*N+i];          // antisymmetric
  const t = Math.max(0, Math.min(1, (m + VMAX)/(2*VMAX)));
  tex[i*N+j] = Math.round(t*255);
}

// ---------- WebGL ----------
const dpr = Math.max(2, window.devicePixelRatio||1);
const gl_c = document.getElementById('gl');
gl_c.style.left=HX+'px'; gl_c.style.top=HY+'px';
gl_c.style.width=HS+'px'; gl_c.style.height=HS+'px';
gl_c.width=Math.round(HS*dpr); gl_c.height=Math.round(HS*dpr);
const gl = gl_c.getContext('webgl');
const vsrc = `attribute vec2 p; varying vec2 uv;
void main(){ uv=vec2(p.x*0.5+0.5, 0.5-p.y*0.5); gl_Position=vec4(p,0.0,1.0);} `;
const fsrc = `precision highp float; varying vec2 uv;
uniform sampler2D tex; uniform sampler2D lut;
void main(){ float v=texture2D(tex,uv).r;
  gl_FragColor=vec4(texture2D(lut, vec2(clamp(v,0.0,1.0),0.5)).rgb,1.0);} `;
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(o);return o;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,vsrc));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fsrc));
gl.linkProgram(prog); gl.useProgram(prog);
const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const pl=gl.getAttribLocation(prog,'p'); gl.enableVertexAttribArray(pl);
gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
// data texture (unit 0)
const dt=gl.createTexture(); gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,dt);
gl.pixelStorei(gl.UNPACK_ALIGNMENT,1);
gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,N,N,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.uniform1i(gl.getUniformLocation(prog,'tex'),0);
// LUT texture (unit 1), sampled pixel-accurately from the original colorbar
const LUT_RGB=[110,86,147,109,85,148,108,83,149,107,82,151,106,80,152,106,79,153,105,77,155,106,77,157,107,79,159,109,80,162,111,82,165,113,83,167,114,85,170,115,85,172,115,85,171,114,85,170,113,84,170,112,84,169,112,83,168,111,83,168,110,82,166,108,81,165,107,81,163,106,80,162,105,80,160,103,79,158,103,80,158,105,81,159,106,83,160,108,85,161,109,87,163,110,89,164,111,91,165,112,92,165,112,92,165,112,93,165,112,94,166,112,94,166,112,95,166,111,95,166,110,94,165,109,93,164,107,93,164,106,92,163,105,91,163,104,91,163,105,93,165,105,94,166,106,95,168,106,97,169,107,98,171,107,100,173,109,102,174,111,103,176,113,105,177,115,107,179,116,109,180,118,111,182,119,112,182,119,112,182,120,113,181,120,113,181,120,113,181,121,114,180,121,114,180,123,116,181,125,118,182,126,120,182,128,122,183,130,124,184,132,125,185,135,129,187,139,133,190,143,137,193,147,140,196,151,144,199,155,148,202,158,151,203,159,152,204,161,154,204,162,155,204,163,157,205,164,158,205,166,160,205,167,161,206,169,162,206,170,164,207,171,165,207,173,167,207,174,168,208,177,171,210,180,174,212,183,177,214,186,180,216,189,184,218,192,187,220,195,189,222,197,191,223,198,193,225,200,195,226,202,197,227,203,198,228,205,200,230,207,202,230,209,204,231,210,205,232,212,207,232,214,209,233,215,210,234,217,212,235,220,214,236,222,217,237,225,219,238,227,221,239,229,223,240,232,226,241,234,228,243,236,230,244,238,232,246,240,234,247,243,236,249,245,238,250,246,240,251,247,241,251,249,242,252,250,244,253,251,245,253,252,246,254,253,247,254,253,246,253,253,246,252,253,245,251,253,245,250,253,245,249,253,244,248,253,244,247,252,243,246,252,242,244,252,242,243,252,241,242,251,240,241,251,239,240,251,239,239,251,238,238,251,237,237,251,236,237,251,236,236,251,235,235,251,233,234,251,232,233,250,231,231,250,229,230,250,228,229,250,226,228,250,226,227,250,225,227,250,224,227,250,224,226,251,223,226,251,222,225,251,221,225,251,220,224,250,219,223,250,218,223,250,217,222,250,216,221,250,215,221,249,214,220,248,213,218,248,212,217,247,210,216,246,209,215,245,208,214,245,207,214,245,207,213,245,206,212,245,206,212,244,205,211,244,205,210,244,204,210,244,203,209,244,202,208,244,201,207,244,200,206,244,199,205,244,198,204,244,197,203,244,195,202,244,193,201,244,192,199,244,190,198,244,189,197,244,187,195,243,185,193,243,183,192,243,181,190,243,178,188,243,176,186,243,174,184,243,171,182,243,169,179,244,166,177,244,163,175,244,161,172,244,158,170,243,155,167,243,151,163,242,148,159,241,144,156,241,141,152,240,137,148,240,134,145,240,132,142,240,129,139,240,126,136,240,124,133,240,121,130,240,118,127,241,117,125,241,115,123,242,113,121,243,111,119,244,110,117,244,108,115,243,105,112,242,102,109,241,99,106,240,96,102,238,94,99,237,91,96,236,88,93,236,85,89,235,82,86,234,79,83,233,76,80,233,73,76,232,70,73,233,69,72,234,68,70,234,67,69,235,66,67,236,65,66,237,64,65,235,62,63,233,60,61,232,58,59,230,56,57,228,54,55,226,51,53,224,49,51,222,48,51,220,47,51,218,45,50,216,44,50,214,42,49,213,41,49];
const lutRGBA=new Uint8Array(256*4);
for(let i=0;i<256;i++){lutRGBA[i*4]=LUT_RGB[i*3];lutRGBA[i*4+1]=LUT_RGB[i*3+1];lutRGBA[i*4+2]=LUT_RGB[i*3+2];lutRGBA[i*4+3]=255;}
const lt=gl.createTexture(); gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,lt);
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,256,1,0,gl.RGBA,gl.UNSIGNED_BYTE,lutRGBA);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.uniform1i(gl.getUniformLocation(prog,'lut'),1);
gl.activeTexture(gl.TEXTURE0);
gl.viewport(0,0,gl_c.width,gl_c.height);
gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

// ---------- Colorbar (2D canvas) ----------
const cb=document.getElementById('cbar');
cb.style.left=CB_X+'px'; cb.style.top=CB_Y+'px';
cb.style.width=CB_W+'px'; cb.style.height=CB_H+'px';
cb.width=Math.round(CB_W*dpr); cb.height=Math.round(CB_H*dpr);
cb.style.border='1px solid #cfcfcd';
const cx=cb.getContext('2d');
for(let x=0;x<cb.width;x++){
  const t=x/(cb.width-1); const idx=Math.max(0,Math.min(255,Math.round(t*255)));
  cx.fillStyle=`rgb(${LUT_RGB[idx*3]},${LUT_RGB[idx*3+1]},${LUT_RGB[idx*3+2]})`;
  cx.fillRect(x,0,1,cb.height);
}

// ---------- Overlay ----------
const ov=document.getElementById('ov');
const NS='http://www.w3.org/2000/svg';
function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
// diagonal separator line (top-left -> bottom-right)
ov.appendChild(el('line',{x1:HX,y1:HY,x2:HX+HS,y2:HY+HS,stroke:'#3a3a38','stroke-width':1.6,opacity:.85}));
// genomic scale bar (bottom-left inside plot)
ov.appendChild(el('line',{x1:HX+10,y1:HY+HS-12,x2:HX+52,y2:HY+HS-12,stroke:'#2b2b2a','stroke-width':2}));

// ---------- HTML labels ----------
const fig=document.getElementById('fig');
function addLbl(x,y,html,cls,extra){const d=document.createElement('div');
  d.className='lbl '+(cls||''); d.style.left=x+'px'; d.style.top=y+'px'; d.innerHTML=html;
  if(extra)Object.assign(d.style,extra); fig.appendChild(d); return d;}
// colorbar title + ticks
const ct=document.createElement('div'); ct.className='cbTitle';
ct.style.left=CB_X+'px'; ct.style.top=(CB_Y-20)+'px'; ct.style.width=CB_W+'px';
ct.innerHTML='&#916; Intensity';   // Delta Intensity
fig.appendChild(ct);
addLbl(CB_X-26, CB_Y-3, '&#8722;40','tiny');   // -40
addLbl(CB_X+CB_W+6, CB_Y-3, '40','tiny');      // 40
// triangle labels near top-left along the diagonal
const t1=document.createElement('div'); t1.className='tri';
t1.style.left=(HX+16)+'px'; t1.style.top=(HY+14)+'px';
t1.innerHTML='&#9792; &#8722; &#9794;';        // female - male
fig.appendChild(t1);
const t2=document.createElement('div'); t2.className='tri';
t2.style.left=(HX+16)+'px'; t2.style.top=(HY+48)+'px';
t2.innerHTML='&#9794; &#8722; &#9792;';        // male - female
fig.appendChild(t2);
</script>
</body>
