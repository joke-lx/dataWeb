<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatin Interaction Heatmap (WebGL)</title>
<style>
  :root{
    --ink:#2C2C2B; --muted:#7D7A75; --canvas:#FFFFFF;
    --promoter:#8a8f98; --enhancer:#2f9e44;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--canvas);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    color:var(--ink);}
  .wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .fig{position:relative;width:560px;height:600px;}
  canvas{position:absolute;image-rendering:pixelated;border:1px solid #d9d9d7;}
  .lbl{position:absolute;font-size:13px;letter-spacing:.2px;}
  .lbl.small{font-size:12px;}
  .lbl.tiny{font-size:11px;}
  .white{color:#fff;font-weight:600;
    text-shadow:0 0 3px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.8);}
  .gene{font-style:italic;font-size:14px;font-weight:600;letter-spacing:.3px;}
  svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  .cbTitle{position:absolute;transform:rotate(-90deg);transform-origin:left top;
    font-size:13px;color:var(--ink);white-space:nowrap;}
</style>
</head>
<body>
<div class="wrap">
  <div class="fig" id="fig">
    <canvas id="gl"></canvas>
    <canvas id="cbar"></canvas>
    <svg id="ov" width="560" height="600"></svg>
  </div>
</div>
<script>
// ---------- Layout constants ----------
const HX = 118, HY = 78, HS = 384;   // heatmap origin + size (square)
const N  = 18;                        // grid cells per side
const CELL = HS / N;
const CB_X = 60, CB_W = 15, CB_Y = HY, CB_H = HS; // colorbar

// ---------- Build the symmetric contact matrix ----------
let seed = 20260721;
function rnd(){ seed = (seed*1103515245 + 12345) & 0x7fffffff; return seed/0x7fffffff; }
const MAX = 50;
const tex = new Uint8Array(N*N);
function put(i,j,v){
  v = Math.max(0, Math.min(MAX, v));
  const b = Math.round(v/MAX*255);
  tex[i*N+j] = b; tex[j*N+i] = b;
}
// base: bright diagonal, broad warm band decaying off-diagonal, varied blue bg
for(let i=0;i<N;i++){
  for(let j=i;j<N;j++){
    const d = j - i;
    let v;
    if(d===0) v = MAX;
    else if(d===1) v = 30 + rnd()*12;
    else if(d===2) v = 20 + rnd()*10;
    else if(d===3) v = 12 + rnd()*9;
    else v = 3 + rnd()*7;              // varied cool background (blue/teal mosaic)
    v += (rnd()-0.5)*4;
    put(i,j,v);
  }
}
// scattered warm cells for biological mosaic texture (more in lower/liver side)
const spots = [[3,7],[5,9],[8,12],[2,5],[10,14],[6,11],[12,15],[4,8],[9,13],
               [7,10],[11,15],[1,4],[14,16],[5,12],[3,10],[8,15]];
spots.forEach(([a,b])=> put(a,b, 12+rnd()*16));
// liver-specific enhancer-promoter loops (the two circled cells), side by side
const LOOP = [[11,7],[11,8]]; // same row, adjacent cols => below diagonal (liver)
put(11,7, 34); put(11,8, 32);
put(12,7, 20); put(12,8, 18);

// ---------- WebGL heatmap ----------
const dpr = Math.max(2, window.devicePixelRatio||1);
const gl_c = document.getElementById('gl');
gl_c.style.left = HX+'px'; gl_c.style.top = HY+'px';
gl_c.style.width = HS+'px'; gl_c.style.height = HS+'px';
gl_c.width = Math.round(HS*dpr); gl_c.height = Math.round(HS*dpr);
const gl = gl_c.getContext('webgl');

const vsrc = `
attribute vec2 p;
varying vec2 uv;
void main(){ uv = vec2(p.x*0.5+0.5, 0.5-p.y*0.5); gl_Position = vec4(p,0.0,1.0);} `;
const fsrc = `
precision highp float;
varying vec2 uv;
uniform sampler2D tex;   // data matrix (LUMINANCE)
uniform sampler2D lut;   // 256x1 colormap sampled from the original figure
void main(){
  float v = texture2D(tex, uv).r;      // 0..1
  gl_FragColor = vec4(texture2D(lut, vec2(clamp(v,0.0,1.0), 0.5)).rgb, 1.0);
}`;
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(o);return o;}
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER,vsrc));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER,fsrc));
gl.linkProgram(prog); gl.useProgram(prog);
const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),gl.STATIC_DRAW);
const pl = gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(pl); gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);   // 1-byte rows (N not multiple of 4)
gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,N,N,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.uniform1i(gl.getUniformLocation(prog,'tex'),0);
// --- colormap LUT, sampled pixel-for-pixel from the original colorbar ---
const LUT_RGB = [91,112,153,89,111,152,87,110,152,85,108,152,83,107,152,81,106,152,81,107,153,82,109,156,84,111,159,85,114,161,87,116,164,88,118,167,90,120,169,92,122,172,93,124,174,95,126,176,97,129,179,98,130,181,99,131,182,100,132,183,101,134,184,102,135,185,103,136,186,103,136,185,102,135,184,101,135,183,101,134,182,100,134,181,100,134,180,100,134,180,101,135,180,101,135,180,101,135,180,102,136,180,103,137,181,104,138,182,105,139,182,106,141,183,107,142,184,109,143,185,112,147,188,115,150,191,118,153,194,121,156,197,124,159,199,125,160,200,125,160,200,125,161,200,125,161,200,125,161,200,125,162,200,124,161,199,123,161,199,123,161,199,122,161,198,121,161,198,121,161,198,122,162,199,122,163,200,123,164,201,123,164,202,123,165,203,125,167,205,126,169,207,128,171,209,129,173,211,131,175,213,132,177,214,134,179,216,135,181,217,137,183,219,138,185,221,139,186,222,140,187,222,140,188,222,141,188,222,141,189,222,142,189,222,142,190,222,142,189,220,142,189,219,142,189,218,142,189,217,142,189,216,143,189,215,144,190,214,145,190,213,146,190,211,147,191,210,148,191,209,150,192,209,152,193,209,153,194,208,155,195,208,157,195,207,159,196,206,160,196,205,162,197,203,163,197,202,165,197,200,166,197,199,167,197,196,168,196,194,169,196,192,170,195,189,170,195,187,171,194,185,171,193,182,172,193,180,172,192,177,173,191,175,174,191,173,175,191,171,175,191,170,176,191,169,177,191,167,178,191,166,180,192,164,182,192,163,184,193,162,185,193,160,187,194,159,189,194,157,191,194,155,192,194,152,193,193,149,195,193,147,196,193,144,197,192,141,197,191,138,198,190,134,198,188,131,198,187,127,199,186,124,199,185,121,199,185,119,198,184,116,198,183,114,198,183,111,199,182,109,200,183,108,201,183,106,202,183,105,202,183,103,203,183,102,205,184,100,207,184,99,208,185,98,210,185,96,211,186,95,213,186,94,214,186,92,215,186,90,216,186,88,217,186,86,218,186,84,218,186,82,219,185,80,219,184,78,220,183,75,220,182,73,220,181,71,221,181,70,221,180,69,222,179,67,222,178,66,223,178,64,224,177,64,225,177,64,226,177,64,227,177,63,228,176,63,229,176,63,230,176,64,231,176,64,232,175,64,233,175,65,234,175,65,234,174,65,234,172,65,234,171,65,234,170,65,234,169,65,234,168,65,233,165,64,232,163,64,231,161,63,229,158,62,228,156,61,227,154,61,226,152,60,224,150,60,223,148,59,222,146,58,221,144,58,221,143,59,221,143,59,221,142,60,222,142,61,222,141,62,223,141,62,224,140,63,225,140,64,226,139,65,227,139,66,228,139,67,228,137,66,228,135,66,229,133,65,229,131,65,229,129,64,228,127,63,228,125,62,227,122,61,226,120,60,226,117,59,225,115,58,224,113,57,223,111,56,222,109,55,221,107,54,220,105,53,219,103,53,219,103,54,219,102,54,219,102,55,219,102,56,219,101,57,219,101,58,220,101,60,221,102,62,222,102,63,222,102,65,223,102,67,222,100,67,221,98,67,221,96,67,220,94,67,219,93,67,218,90,67,216,87,66,214,84,65,212,82,65,210,79,64,208,76,63,206,75,64,204,74,64,203,72,65,201,71,66,199,70,66,198,71,69,198,75,74,198,79,79,199,84,83,199,88,88,199,92,93];
const lutRGBA = new Uint8Array(256*4);
for(let i=0;i<256;i++){ lutRGBA[i*4]=LUT_RGB[i*3]; lutRGBA[i*4+1]=LUT_RGB[i*3+1];
  lutRGBA[i*4+2]=LUT_RGB[i*3+2]; lutRGBA[i*4+3]=255; }
const lutTex = gl.createTexture();
gl.activeTexture(gl.TEXTURE1);
gl.bindTexture(gl.TEXTURE_2D, lutTex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,256,1,0,gl.RGBA,gl.UNSIGNED_BYTE,lutRGBA);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.uniform1i(gl.getUniformLocation(prog,'lut'),1);
gl.activeTexture(gl.TEXTURE0);
gl.viewport(0,0,gl_c.width,gl_c.height);
gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

// ---------- Colorbar (2D canvas) ----------
const cb = document.getElementById('cbar');
cb.style.left=CB_X+'px'; cb.style.top=CB_Y+'px';
cb.style.width=CB_W+'px'; cb.style.height=CB_H+'px';
cb.width=Math.round(CB_W*dpr); cb.height=Math.round(CB_H*dpr);
cb.style.border='1px solid #d9d9d7';
const cx = cb.getContext('2d');
for(let y=0;y<cb.height;y++){
  const tt = 1 - y/(cb.height-1);            // top = 1 (=50), bottom = 0
  const idx = Math.max(0,Math.min(255,Math.round(tt*255)));
  cx.fillStyle = `rgb(${LUT_RGB[idx*3]},${LUT_RGB[idx*3+1]},${LUT_RGB[idx*3+2]})`;
  cx.fillRect(0,y,cb.width,1);
}

// ---------- SVG overlay ----------
const ov = document.getElementById('ov');
const SVGNS='http://www.w3.org/2000/svg';
function el(n,a){const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function txt(x,y,s,cls,attr){const e=el('text',Object.assign({x,y},attr||{}));e.textContent=s;if(cls)e.setAttribute('class',cls);return e;}

// diagonal red line (top-left -> bottom-right)
ov.appendChild(el('line',{x1:HX,y1:HY,x2:HX+HS,y2:HY+HS,stroke:'#e03131','stroke-width':2.4,opacity:.92}));

// interaction circles on the two loop cells
LOOP.forEach(([r,c])=>{
  const cxp = HX + (c+0.5)*CELL;
  const cyp = HY + (r+0.5)*CELL;
  ov.appendChild(el('circle',{cx:cxp,cy:cyp,r:CELL*0.5,fill:'none',stroke:'#e03131','stroke-width':2}));
});

// ---- gene / regulatory track geometry (bottom) ----
const promX = HX + 0.5*CELL;                 // promoter near left edge
const enhCols = [6,8,9];                      // enhancer positions (cols)
const enhX = enhCols.map(c=> HX + (c+0.5)*CELL);
const trackY = HY + HS + 10;                  // marker row just under heatmap

// left promoter marker (gray) on the vertical edge track
ov.appendChild(el('rect',{x:HX-14,y:HY+11*CELL,width:9,height:CELL*0.9,fill:'#8a8f98'}));
// bottom enhancer markers (green)
enhX.forEach(x=> ov.appendChild(el('rect',{x:x-5,y:trackY,width:10,height:9,fill:'#2f9e44'})));
// bottom promoter marker (gray) aligned with gene start
ov.appendChild(el('rect',{x:promX-5,y:trackY,width:9,height:9,fill:'#8a8f98'}));

// arcs connecting promoter to enhancers
const arcTop = trackY + 12;
enhX.forEach(x=>{
  const mx=(promX+x)/2, dip=arcTop + Math.min(46, Math.abs(x-promX)*0.28+16);
  ov.appendChild(el('path',{d:`M ${promX} ${arcTop} Q ${mx} ${dip} ${x} ${arcTop}`,
    fill:'none',stroke:'#c9c9c6','stroke-width':1.4}));
});

document.getElementById('fig').appendChild(ov);

// ---------- HTML text labels (crisp DOM text) ----------
const fig = document.getElementById('fig');
function addLbl(x,y,html,cls,extra){
  const d=document.createElement('div'); d.className='lbl '+(cls||'');
  d.style.left=x+'px'; d.style.top=y+'px'; d.innerHTML=html;
  if(extra) Object.assign(d.style, extra);
  fig.appendChild(d); return d;
}
// legend (top)
const legY=16;
fig.appendChild(Object.assign(document.createElement('div'),{}));
addLbl(HX+70, legY, '<span style="display:inline-block;width:12px;height:12px;background:#8a8f98;vertical-align:-1px;margin-right:6px;"></span>Promoter','small');
addLbl(HX+180, legY, '<span style="display:inline-block;width:12px;height:12px;background:#2f9e44;vertical-align:-1px;margin-right:6px;"></span>Enhancer','small');
// top coordinate axis
addLbl(HX, HY-24, 'Chr. 3: 96,600,000','small');
addLbl(HX+HS-96, HY-24, '96,690,000','small');
// in-plot cell-type + RPS labels
addLbl(HX+14, HY+14, 'Muscle<br>RPS: 0','small white');
addLbl(HX+HS-108, HY+HS*0.42, 'Liver<br>RPS: 4.92','small white',{textAlign:'right',width:'100px'});
// colorbar ticks + title
addLbl(CB_X+CB_W+6, CB_Y-8, '50','tiny');
addLbl(CB_X+CB_W+6, CB_Y+CB_H-16, '0','tiny');
const ct=document.createElement('div'); ct.className='cbTitle';
ct.style.left=(CB_X-14)+'px'; ct.style.top=(CB_Y+CB_H)+'px'; ct.textContent='Intensity';
fig.appendChild(ct);
// gene label
addLbl(HX-6, trackY+30, 'ABCG5','gene');
</script>
</body>
</html>
