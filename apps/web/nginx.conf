# nginx config for the dataWeb web container.
# Serves the built SPA and reverse-proxies /api to the backend container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA client-side routing: fall back to index.html for unknown paths
    # (React Router handles /hic, /tracks, /ctcf-motif, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend service. `api` is the compose
    # service name, resolved on the internal docker network.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Binary genomics responses can be large; don't buffer excessively.
        proxy_read_timeout 120s;
    }

    # Cache-bust hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
